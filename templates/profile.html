{% extends "base.html" %}

{% block content %}
<section class="page-panel">
    <h1>Личный кабинет</h1>
    <p>Здравствуйте, {{ current_user.name }}.</p>
    <p>Ваш email: {{ current_user.email }}</p>
    <p>Количество ваших заявок: {{ tickets_count }}</p>

    <a class="btn btn-primary" href="{{ url_for('new_ticket') }}">Создать заявку</a>
    <a class="btn btn-outline-primary" href="{{ url_for('tickets') }}">Посмотреть заявки</a>
</section>
{% endblock %}
